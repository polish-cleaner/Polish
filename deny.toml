# cargo-deny config — enforces architecture rules per ARCHITECTURE.md §8.

[graph]
all-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.92

[bans]
multiple-versions = "warn"
wildcards = "deny"

# Architectural ban: polish-core (wc-core) must NOT depend on any infrastructure crate.
# This list grows as adapters add deps. Reviewed at release per ARCHITECTURE.md §8.
[[bans.features]]
crate = "wc-core"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
