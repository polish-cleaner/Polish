<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Polish</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  /* ============================================================
     POLISH — DESIGN TOKENS
     ============================================================ */
  :root {
    /* Surfaces — warm cream paper */
    --bg:               oklch(0.968 0.011 86);
    --bg-deep:          oklch(0.945 0.013 86);
    --surface:          #ffffff;
    --surface-warm:     oklch(0.985 0.008 86);
    --surface-sunken:   oklch(0.955 0.012 86);

    /* Ink — slightly cool charcoal */
    --ink:              oklch(0.205 0.013 250);
    --ink-soft:         oklch(0.380 0.010 250);
    --ink-muted:        oklch(0.560 0.008 250);
    --ink-faint:        oklch(0.720 0.006 250);

    /* Hairlines */
    --line:             oklch(0.895 0.007 250);
    --line-strong:      oklch(0.825 0.008 250);
    --line-soft:        oklch(0.935 0.006 250);

    /* Accent — deep moss */
    --accent:           oklch(0.420 0.085 155);
    --accent-deep:      oklch(0.320 0.072 155);
    --accent-hover:     oklch(0.380 0.085 155);
    --accent-soft:      oklch(0.940 0.030 155);
    --accent-ink:       oklch(0.280 0.060 155);

    /* Status — desaturated, restrained */
    --status-good:      oklch(0.545 0.110 155);
    --status-warn:      oklch(0.680 0.130 70);
    --status-warn-soft: oklch(0.945 0.045 80);
    --status-danger:    oklch(0.545 0.180 25);
    --status-danger-soft:oklch(0.955 0.030 25);
    --status-info:      oklch(0.520 0.080 240);

    /* Type */
    --font-display:     'Instrument Serif', 'Georgia', serif;
    --font-body:        'Inter', system-ui, -apple-system, sans-serif;
    --font-mono:        'JetBrains Mono', ui-monospace, monospace;

    /* Density (toggled by tweak) */
    --density:          1;
    --space-1:          calc(4px * var(--density));
    --space-2:          calc(8px * var(--density));
    --space-3:          calc(12px * var(--density));
    --space-4:          calc(16px * var(--density));
    --space-5:          calc(20px * var(--density));
    --space-6:          calc(24px * var(--density));
    --space-8:          calc(32px * var(--density));
    --space-10:         calc(40px * var(--density));
    --space-12:         calc(48px * var(--density));
    --space-16:         calc(64px * var(--density));

    /* Radii — restrained */
    --r-sm:             3px;
    --r-md:             5px;
    --r-lg:             8px;
    --r-pill:           999px;

    /* Motion */
    --ease-out:         cubic-bezier(0.22, 1, 0.36, 1);
    --ease-spring:      cubic-bezier(0.34, 1.56, 0.64, 1);
    --t-fast:           120ms;
    --t-base:           240ms;
    --t-slow:           400ms;
  }

  /* ============================================================
     RESET
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-body);
    font-feature-settings: 'cv11', 'ss01';
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
  input, select, textarea { font: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent-soft); color: var(--accent-ink); }

  /* ============================================================
     TYPOGRAPHY UTILITIES
     ============================================================ */
  .display { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.01em; line-height: 1.05; }
  .display-italic { font-family: var(--font-display); font-style: italic; font-weight: 400; letter-spacing: -0.005em; line-height: 1.1; }
  .mono { font-family: var(--font-mono); font-feature-settings: 'tnum' 1, 'zero' 1; }
  .label { font-size: 10.5px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted); }
  .micro { font-size: 11px; color: var(--ink-muted); }

  /* ============================================================
     APP LAYOUT
     ============================================================ */
  #root { height: 100vh; display: flex; }

  /* ============================================================
     SCROLLBAR
     ============================================================ */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 999px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }

  /* ============================================================
     SHARED COMPONENT STYLES (used across split JSX files)
     ============================================================ */

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    overflow: hidden;
  }
  .card-sunken { background: var(--surface-warm); }

  /* Button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: 9px 14px;
    border-radius: var(--r-md);
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
    transition: background var(--t-fast) var(--ease-out), border-color var(--t-fast), color var(--t-fast), transform var(--t-fast);
    white-space: nowrap;
    border: 1px solid transparent;
  }
  .btn:active { transform: translateY(0.5px); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--surface); border-color: var(--line-strong); color: var(--ink); }
  .btn-secondary:hover { background: var(--surface-sunken); border-color: var(--ink-muted); }
  .btn-ghost { color: var(--ink-soft); }
  .btn-ghost:hover { background: var(--surface-sunken); color: var(--ink); }
  .btn-danger { background: var(--status-danger); color: #fff; }
  .btn-danger:hover { filter: brightness(0.95); }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .btn-lg { padding: 12px 20px; font-size: 14px; }
  .btn[disabled] { opacity: 0.4; cursor: not-allowed; }
  .btn[disabled]:active { transform: none; }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: var(--r-pill);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.02em;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink-soft);
    line-height: 1.2;
  }
  .badge-accent { background: var(--accent-soft); border-color: transparent; color: var(--accent-ink); }
  .badge-warn { background: var(--status-warn-soft); border-color: transparent; color: oklch(0.42 0.12 65); }
  .badge-danger { background: var(--status-danger-soft); border-color: transparent; color: oklch(0.42 0.16 25); }
  .badge-pro {
    background: var(--ink);
    color: var(--surface);
    border: none;
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
    font-size: 9.5px;
    text-transform: uppercase;
    padding: 3px 7px;
  }

  /* Dot indicator */
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); }
  .dot-good { background: var(--status-good); box-shadow: 0 0 0 3px oklch(0.545 0.110 155 / 0.15); }
  .dot-warn { background: var(--status-warn); }
  .dot-danger { background: var(--status-danger); }
  @keyframes pulse-good {
    0%, 100% { box-shadow: 0 0 0 0px oklch(0.545 0.110 155 / 0.4); }
    50% { box-shadow: 0 0 0 5px oklch(0.545 0.110 155 / 0); }
  }
  .dot-pulsing { animation: pulse-good 2.4s var(--ease-out) infinite; }

  /* Progress bar */
  .progress {
    height: 4px;
    background: var(--surface-sunken);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width var(--t-base) var(--ease-out);
  }
  .progress-bar-indeterminate {
    width: 30%;
    animation: indeterminate 1.6s var(--ease-out) infinite;
  }
  @keyframes indeterminate {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }

  /* Checkbox */
  .check {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--line-strong);
    border-radius: 3px;
    background: var(--surface);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all var(--t-fast);
    flex-shrink: 0;
  }
  .check:hover { border-color: var(--ink-muted); }
  .check.checked { background: var(--accent); border-color: var(--accent); }
  .check.indeterminate { background: var(--surface); border-color: var(--accent); }
  .check.indeterminate::after { content: ''; width: 8px; height: 1.5px; background: var(--accent); border-radius: 1px; }
  .check svg { color: #fff; opacity: 0; transition: opacity var(--t-fast); }
  .check.checked svg { opacity: 1; }

  /* Toggle (switch) */
  .toggle {
    width: 30px;
    height: 18px;
    border-radius: 999px;
    background: var(--line-strong);
    position: relative;
    cursor: pointer;
    transition: background var(--t-fast);
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    transition: transform var(--t-base) var(--ease-spring);
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { transform: translateX(12px); }

  /* Segmented control */
  .segmented {
    display: inline-flex;
    background: var(--surface-sunken);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 3px;
    gap: 2px;
  }
  .segmented button {
    padding: 6px 12px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    transition: all var(--t-fast);
  }
  .segmented button:hover { color: var(--ink); }
  .segmented button.active {
    background: var(--surface);
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 0.5px var(--line-strong);
  }

  /* Number display */
  .num-display {
    font-family: var(--font-mono);
    font-feature-settings: 'tnum' 1, 'zero' 1;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .num-unit {
    font-family: var(--font-body);
    font-weight: 400;
    color: var(--ink-muted);
    font-size: 0.65em;
    margin-left: 0.2em;
    letter-spacing: 0.02em;
  }

  /* Entry animations — disabled. CSS animation behavior was inconsistent
     in some embedding contexts, leaving elements stuck at opacity 0.
     The classes remain as semantic hooks; elements are simply visible. */
  .fade-up, .fade-in { opacity: 1; }

  /* Divider */
  .divider { height: 1px; background: var(--line); width: 100%; }
  .divider-vertical { width: 1px; background: var(--line); align-self: stretch; }

  /* Page container */
  .page {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--bg);
  }
  .page-inner {
    max-width: 1240px;
    margin: 0 auto;
    padding: var(--space-10) var(--space-10) var(--space-16);
  }
  .page-header { margin-bottom: var(--space-8); }
  .page-title { font-family: var(--font-display); font-size: 44px; line-height: 1; letter-spacing: -0.015em; margin: 0; }
  .page-title em { font-style: italic; color: var(--accent); }
  .page-subtitle { color: var(--ink-soft); margin-top: var(--space-3); font-size: 14px; max-width: 56ch; }

  /* Wizard step indicator */
  .wizard-steps { display: flex; gap: var(--space-2); align-items: center; }
  .wizard-step {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px 6px 8px;
    border-radius: var(--r-pill);
    font-size: 12px;
    color: var(--ink-muted);
  }
  .wizard-step-num {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--surface-sunken);
    border: 1px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
  }
  .wizard-step.active { background: var(--accent-soft); color: var(--accent-ink); }
  .wizard-step.active .wizard-step-num { background: var(--accent); color: #fff; border-color: var(--accent); }
  .wizard-step.done { color: var(--ink-soft); }
  .wizard-step.done .wizard-step-num { background: var(--accent); color: #fff; border-color: var(--accent); }
  .wizard-step-line { width: 16px; height: 1px; background: var(--line-strong); }

  /* Empty state helper */
  .stat-row { display: flex; align-items: baseline; gap: var(--space-2); }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-muted); font-weight: 500; }

  /* Drawer */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: oklch(0.20 0.012 250 / 0.25);
    backdrop-filter: blur(2px);
    z-index: 40;
  }
  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 560px; max-width: 90vw;
    background: var(--surface);
    border-left: 1px solid var(--line);
    z-index: 41;
    display: flex; flex-direction: column;
    box-shadow: -8px 0 32px oklch(0.20 0.012 250 / 0.08);
  }
  @keyframes slideInRight {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: oklch(0.20 0.012 250 / 0.35);
    backdrop-filter: blur(2px);
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: 0 20px 60px oklch(0.20 0.012 250 / 0.18);
    max-width: 480px;
    width: 90vw;
  }
  @keyframes modalIn {
    from { transform: scale(0.96) translateY(8px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* Tooltip-ish */
  [data-tip] { position: relative; }
  [data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%);
    background: var(--ink); color: var(--surface);
    font-size: 11px; padding: 4px 8px; border-radius: 4px;
    white-space: nowrap; z-index: 100;
    pointer-events: none;
  }

  /* Click & ripple ish — none; we keep motion subtle */

  /* Focus ring */
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-sm); }
  button:focus-visible { outline-offset: 2px; }

  /* Toast */
  .toast-stack { position: fixed; bottom: 24px; right: 24px; z-index: 60; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 12px 16px;
    min-width: 280px;
    max-width: 360px;
    box-shadow: 0 8px 24px oklch(0.20 0.012 250 / 0.10);
    display: flex; gap: 12px; align-items: flex-start;
  }
  @keyframes toastIn {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* TWEAKS PANEL DARK STYLING -- we want the panel to feel native to the editorial light theme */
  /* (left default; the panel handles itself) */
</style>
